name: Build Article PDF and Submission Package

"on":
  push:
    tags:
      - "draft-*"
      - "v*"
      - "submission-*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            python3 \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            zip

      - name: Resolve build version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual-$(date -u +%Y%m%d-%H%M%S)}"
          SAFE_VERSION="${VERSION//\//-}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "PDF_NAME=When_Faith_Becomes_Law_${SAFE_VERSION}.pdf" >> "$GITHUB_ENV"
          echo "ZIP_NAME=When_Faith_Becomes_Law_${SAFE_VERSION}_submission_package.zip" >> "$GITHUB_ENV"

      - name: Validate article sources
        run: python3 tools/validate_article.py

      - name: Build PDF
        run: make PDF_NAME="${PDF_NAME}" pdf

      - name: Create submission package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf submission_package
          mkdir -p submission_package
          cp main.md abstract.md outline.md references.bib README.md submission_package/
          cp -r sections tools submission_package/
          cp "output/${PDF_NAME}" submission_package/

          cat > submission_package/README_Submission.txt <<EOF_PACKAGE
          Submission Package - When Faith Becomes Law
          Version: ${VERSION}
          Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          Files included:
          - main.md
          - abstract.md
          - outline.md
          - sections/
          - references.bib
          - tools/validate_article.py
          - README.md
          - ${PDF_NAME}
          EOF_PACKAGE

          (
            cd submission_package
            zip -r "../output/${ZIP_NAME}" .
          )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Article_Build_${{ env.VERSION }}
          path: |
            output/*.pdf
            output/*.zip
          retention-days: 90
          if-no-files-found: error
