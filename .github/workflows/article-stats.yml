name: Article Stats & Citation Check

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3

      - name: Generate Article Statistics
        id: stats
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f main.md ]; then
            echo "main.md was not found. Cannot generate article statistics." >&2
            exit 1
          fi

          echo "## 📊 Article Statistics Report" > stats.md
          echo "" >> stats.md
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> stats.md
          echo "" >> stats.md

          TOTAL_WORDS=$(pandoc main.md --to plain | wc -w | tr -d ' ')
          echo "**Total words**: $TOTAL_WORDS" >> stats.md
          echo "" >> stats.md

          echo "**Word count per section:**" >> stats.md
          echo "" >> stats.md
          if compgen -G "sections/*.md" > /dev/null; then
            for file in sections/*.md; do
              SECTION_NAME=$(basename "$file" .md | sed 's/^[0-9]*-//; s/-/ /g')
              WORDS=$(pandoc "$file" --to plain | wc -w | tr -d ' ')
              echo "- **$SECTION_NAME**: $WORDS words" >> stats.md
            done
          else
            echo "- No section files found in sections/*.md" >> stats.md
          fi
          echo "" >> stats.md

          echo "**Readability (Flesch-Kincaid Grade Level):**" >> stats.md
          python3 - <<'EOF' >> stats.md
          import re
          from pathlib import Path

          def count_syllables(word: str) -> int:
              word = word.lower()
              groups = re.findall(r"[aeiouy]+", word)
              count = len(groups)
              if word.endswith("e") and count > 1:
                  count -= 1
              return max(count, 1)

          text = Path("main.md").read_text(encoding="utf-8")
          sentences = len(re.findall(r"[.!?]+", text))
          words = re.findall(r"\b[a-zA-Z]+\b", text)
          syllables = sum(count_syllables(word) for word in words)

          if sentences == 0 or not words:
              score = 0
          else:
              score = 0.39 * (len(words) / sentences) + 11.8 * (syllables / len(words)) - 15.59

          print(f"- **Overall**: {score:.1f} (Grade ~{round(score)})")
          EOF
          echo "" >> stats.md

      - name: Citation Validation
        shell: bash
        run: |
          set -euo pipefail

          echo "## 🔍 Citation Check" >> stats.md
          echo "" >> stats.md

          python3 - <<'EOF' >> stats.md
          import re
          from pathlib import Path

          content = Path("main.md").read_text(encoding="utf-8")
          citation_blocks = re.findall(r"\[([^\]]*@[^\]]+)\]", content)

          citations = set()
          for block in citation_blocks:
              for match in re.findall(r"@([A-Za-z0-9_:\-.]+)", block):
                  citations.add(match)

          bib_path = Path("references.bib")
          if bib_path.exists():
              bib = bib_path.read_text(encoding="utf-8")
              bib_keys = set(re.findall(r"@\w+\s*\{\s*([^,\s]+)", bib))
          else:
              bib_keys = set()

          missing = sorted(citations - bib_keys)

          if not citations:
              print("ℹ️ No Pandoc-style citations found in main.md.")
          elif missing:
              print("⚠️ Missing citations:")
              for key in missing:
                  print(f"- @{key}")
          else:
              print("✅ All citations found in references.bib.")
          EOF

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('stats.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Print Report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
        run: cat stats.md
