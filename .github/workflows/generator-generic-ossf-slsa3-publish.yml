name: SLSA generic generator

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build article artifacts
    runs-on: ubuntu-latest

    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Build artifacts
        run: |
          set -euo pipefail

          mkdir -p output

          if [ -f Makefile ]; then
            make
          elif [ -f main.md ]; then
            pandoc main.md \
              --from gfm \
              --pdf-engine=xelatex \
              --citeproc \
              -o output/faith-becomes-law.pdf
          else
            echo "::error::No Makefile or main.md found. Nothing to build."
            exit 1
          fi

          if ! find output -maxdepth 1 -type f | grep -q .; then
            echo "::error::Build completed, but no files were created in output/."
            exit 1
          fi

      - name: Generate subject for provenance
        id: hash
        shell: bash
        run: |
          set -euo pipefail

          cd output

          sha256sum * > ../checksums.sha256
          echo "hashes=$(base64 -w0 ../checksums.sha256)" >> "$GITHUB_OUTPUT"

          cp ../checksums.sha256 checksums.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: article-output
          path: output/*
          if-no-files-found: error
          retention-days: 14

  provenance:
    name: Generate SLSA provenance
    needs: [build]

    permissions:
      actions: read
      id-token: write
      contents: write

    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: ${{ github.event_name == 'release' }}

  release-assets:
    name: Upload release artifacts
    needs: [build, provenance]
    if: github.event_name == 'release'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: article-output
          path: dist

      - name: Upload files to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG_NAME" dist/* --clobber
